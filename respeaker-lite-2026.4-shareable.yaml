# =============================================================================
# ReSpeaker Lite ESPHome Configuration
# Compatible with: ESPHome 2026.4.x
# Version: 2.0 (2026.4 upgrade + UX improvements)
# Based on: formatBCE Respeaker Lite Satellite
#   https://github.com/formatBCE/Respeaker-Lite-ESPHome-integration
#
# CHANGES FROM v1 (2026.3.x  2026.4.x):
#
#   1. min_version bumped to 2026.4.0
#
#   2. hey_jarvis wake word model pinned to explicit v1 URL.
#      The shorthand "hey_jarvis" now resolves to the v2 model,
#      which fails to allocate its tensor arena on the 2026.3.x+
#      audio stack due to PSRAM fragmentation. Pinning to the v1
#      JSON path restores reliable wake word detection.
#      See: https://github.com/esphome/issues/issues/7242
#
#   3. use_headphone_jack substitution added at the top of the file.
#      Set to "true" to route audio to the 3.5mm jack instead of
#      the JST speaker terminal. Previously required hunting for a
#      commented block deep in on_boot. Now a single line change.
#
#   4. Voice assistant tuning exposed as Home Assistant UI sliders:
#      - Microphone auto gain (0-31 dBFS)
#      - Noise suppression level (0-4)
#      - Volume multiplier (1.0-4.0)
#      Previously these were hardcoded values in voice_assistant:.
#      Sliders persist across reboots via restore_value: true.
#
#   5. Wake word sensitivity select now includes kenobi cutoffs,
#      which were missing from the v1 sensitivity table.
#
# INHERITED CHANGES FROM v1 (still apply, kept for reference):
#
#   6. sensor.template.publish replaced with lambda publish_state()
#   7. !lambda in script.execute / homeassistant.event replaced with
#      global string buffers (tts_uri_buf, stt_text_buf)
#   8. light.turn_on brightness: !lambda replaced with C++ light call API
#   9. media_player name: None  name: "None"
#  10. select.state  current_option()
#  11. Mute/unmute sound  Mute-unmute sound (forward slash fix)
#  12. Factory Reset Coming Up LED effect defined in led_internal
#  13. 3.5mm headphone jack I2C register block (now driven by substitution)
#
# KNOWN ISSUES / CAVEATS:
#
#   - formatBCE's respeaker_microphone branch has not been officially
#     updated for ESPHome 2026.4.x. This config is expected to compile
#     but has not been confirmed on 2026.4.5. Test with Clean Build first.
#   - PSRAM wake word allocation bug is NOT fixed in 2026.4.x -- the
#     hey_jarvis v1 pin (change #2 above) is a workaround, not a fix.
#   - If your ReSpeaker Lite was manually DFU-flashed, comment out the
#     firmware: block under respeaker_lite: to avoid hash mismatch errors.
# =============================================================================

substitutions:
  # Device identity -- change these per unit
  device_name: room2
  friendly_name: "room2"

  # ---------------------------------------------------------------------------
  # AUDIO OUTPUT: Set to "true" for 3.5mm headphone jack, "false" for JST speaker
  # ---------------------------------------------------------------------------
  use_headphone_jack: "false"

  # Phases of the Voice Assistant
  voice_assist_idle_phase_id: '1'
  voice_assist_waiting_for_command_phase_id: '2'
  voice_assist_listening_for_command_phase_id: '3'
  voice_assist_thinking_phase_id: '4'
  voice_assist_replying_phase_id: '5'
  voice_assist_not_ready_phase_id: '10'
  voice_assist_error_phase_id: '11'

  # Change to "true" if you have a hidden SSID
  hidden_ssid: "false"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: formatbce.Respeaker Lite Satellite
    version: 2026.4.0
  min_version: 2026.4.0
  on_boot:
    # -------------------------------------------------------------------------
    # HEADPHONE JACK: Controlled by use_headphone_jack substitution at the top.
    # Set use_headphone_jack: "true" above — no need to edit anything here.
    # This block writes to the TLV320AIC3204 codec registers via I2C to
    # reroute audio output at boot. Only runs when substitution is "true".
    # DO NOT set to "true" if you are using the JST speaker connector.
    # -------------------------------------------------------------------------
    - priority: 600
      then:
        - if:
            condition:
              lambda: return std::string("${use_headphone_jack}") == "true";
            then:
              - lambda: |-
                  i2c::I2CDevice dev;
                  dev.set_i2c_bus(id(internal_i2c));
                  dev.set_i2c_address(0x18);
                  dev.write_byte(0x00, 0x01);  // Select page 1
                  dev.write_byte(0x10, 0x00);  // HPL routing
                  dev.write_byte(0x11, 0x00);  // HPR routing
                  dev.write_byte(0x12, 0x40);  // LOL output
                  dev.write_byte(0x13, 0x40);  // LOR output
                  dev.write_byte(0x00, 0x00);  // Return to page 0
                  ESP_LOGI("audio", "Headphone jack routing active");
    - priority: 375
      then:
        - lambda: |-
            id(next_timer).publish_state(-1);
        - script.execute: control_leds
        - delay: 10min
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: control_leds
    - priority: -100
      then:
        - lambda: |-
            id(alarm_time).publish_state(id(saved_alarm_time));
        - lambda: |-
            auto call = id(alarm_action).make_call();
            call.set_option(id(saved_alarm_action));
            call.perform();
        - lambda: |-
            setenv("TZ", id(saved_time_zone).c_str(), 1);
            tzset();
        # Apply saved slider values to the voice assistant on boot
        - lambda: |-
            id(va).set_noise_suppression_level((int)id(noise_suppression_level_slider).state);
            id(va).set_auto_gain((int)id(auto_gain_slider).state);
            id(va).set_volume_multiplier(id(volume_multiplier_slider).state);
  on_shutdown:
    then:
      - lambda: id(respeaker).mute_speaker();

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended
    components:
      - espressif/esp-nn==1.1.2
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

wifi:
  id: wifi_id
  fast_connect: ${hidden_ssid}
  on_connect:
    - lambda: id(improv_ble_in_progress) = false;
    - script.execute: control_leds
  on_disconnect:
    - script.execute: control_leds
  ssid: !secret wifi_ssid
  password: !secret wifi_password

network:
  enable_ipv6: true

logger:
  level: debug
  initial_level: debug
  logs:
    sensor: WARN

api:
  id: api_id
  actions:
    - action: start_va
      then:
        - voice_assistant.start
    - action: stop_va
      then:
        - voice_assistant.stop
    - action: set_alarm_time
      variables:
        alarm_time_hh_mm: string
      then:
        - lambda: |-
            if (alarm_time_hh_mm.length() == 5 &&
              isdigit(alarm_time_hh_mm[0]) && isdigit(alarm_time_hh_mm[1]) &&
              isdigit(alarm_time_hh_mm[3]) && isdigit(alarm_time_hh_mm[4])) {
                id(alarm_time).publish_state(alarm_time_hh_mm);
                id(saved_alarm_time) = alarm_time_hh_mm;
              }
    - action: set_time_zone
      variables:
        posix_time_zone: string
      then:
        - lambda: |-
            setenv("TZ", posix_time_zone.c_str(), 1);
            tzset();
            id(saved_time_zone) = posix_time_zone;
            id(publish_current_time).execute();
  on_client_connected:
    - script.execute: control_leds
  on_client_disconnected:
    - script.execute: control_leds

# Uncomment if you have problems with TTS because of HA HTTPS internal URL
# http_request:
#   verify_ssl: false

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz

psram:
  mode: octal
  speed: 80MHz

globals:
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: improv_ble_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: saved_alarm_time
    type: std::string
    restore_value: yes
    initial_value: '"Unknown"'
  - id: saved_time_zone
    type: std::string
    restore_value: yes
    initial_value: '"UTC0"'
  - id: saved_alarm_action
    type: std::string
    restore_value: yes
    initial_value: '"Play sound"'
  - id: first_active_timer
    type: voice_assistant::Timer
    restore_value: no
  - id: is_timer_active
    type: bool
    restore_value: no
  - id: factory_reset_requested
    type: bool
    restore_value: no
    initial_value: 'false'
  # String buffers for homeassistant.event dynamic data (2026.3.x+ workaround)
  - id: tts_uri_buf
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: stt_text_buf
    type: std::string
    restore_value: no
    initial_value: '""'

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: check_alarm
    on_time_sync:
      - script.execute: publish_current_time

# =============================================================================
# UI SLIDERS — Voice Assistant Tuning
# Exposed to Home Assistant as number entities under the device page.
# Values persist across reboots. Changes take effect immediately.
# =============================================================================
number:
  # ---------------------------------------------------------------------------
  # Microphone Auto Gain (dBFS)
  # Controls how aggressively the mic input is boosted. Higher values help
  # pick up quieter voices from across a room but increase background noise.
  # Matches voice_assistant: auto_gain — was hardcoded at 31 dBFS in v1.
  # ---------------------------------------------------------------------------
  - platform: template
    name: "Mic auto gain"
    id: auto_gain_slider
    icon: "mdi:microphone-plus"
    entity_category: config
    min_value: 0
    max_value: 31
    step: 1
    initial_value: 31
    unit_of_measurement: dBFS
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(va).set_auto_gain((int)x);
            ESP_LOGI("va_tuning", "Auto gain set to: %d dBFS", (int)x);

  # ---------------------------------------------------------------------------
  # Noise Suppression Level
  # 0 = off, 1 = low, 2 = medium, 3 = high, 4 = maximum
  # Higher values reduce background noise but can make voices sound robotic.
  # Matches voice_assistant: noise_suppression_level — was hardcoded at 3 in v1.
  # ---------------------------------------------------------------------------
  - platform: template
    name: "Noise suppression level"
    id: noise_suppression_level_slider
    icon: "mdi:sine-wave"
    entity_category: config
    min_value: 0
    max_value: 4
    step: 1
    initial_value: 3
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(va).set_noise_suppression_level((int)x);
            ESP_LOGI("va_tuning", "Noise suppression set to: %d", (int)x);

  # ---------------------------------------------------------------------------
  # Volume Multiplier
  # Scales the mic input volume sent to Whisper for speech recognition.
  # Increase if HA isn't hearing commands clearly. Decrease if clipping.
  # Matches voice_assistant: volume_multiplier — was hardcoded at 2.0 in v1.
  # ---------------------------------------------------------------------------
  - platform: template
    name: "Volume multiplier"
    id: volume_multiplier_slider
    icon: "mdi:volume-high"
    entity_category: config
    min_value: 1.0
    max_value: 4.0
    step: 0.5
    initial_value: 2.0
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(va).set_volume_multiplier(x);
            ESP_LOGI("va_tuning", "Volume multiplier set to: %.1f", x);

switch:
  - platform: template
    id: speaker_mute_switch
    name: Speaker mute
    icon: mdi:volume-mute
    internal: true
    optimistic: true
    turn_on_action:
      - lambda: id(respeaker).mute_speaker();
    turn_off_action:
      - lambda: id(respeaker).unmute_speaker();
  - platform: gpio
    internal: true
    pin:
      number: GPIO4
      inverted: true
    id: mute_toggle
    on_turn_on:
      - delay: 300ms
      - switch.turn_off: mute_toggle
  - platform: template
    id: mic_mute_switch
    name: Mic mute
    icon: mdi:microphone-off
    lambda: |-
      if (id(mute_state).state) {
        return true;
      } else {
        return false;
      }
    on_turn_on:
      - if:
          condition:
            and:
              - lambda: return !id(init_in_progress);
              - switch.is_on: mute_sound
          then:
            - lambda: |-
                id(play_sound).execute(false, id(mute_switch_on_sound));
    on_turn_off:
      - if:
          condition:
            and:
              - lambda: return !id(init_in_progress);
              - switch.is_on: mute_sound
          then:
            - lambda: |-
                id(play_sound).execute(false, id(mute_switch_off_sound));
    turn_on_action:
      - switch.turn_on: mute_toggle
    turn_off_action:
      - switch.turn_on: mute_toggle
  - platform: template
    id: button_sound
    name: Button click sounds
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: mute_sound
    name: Mute-unmute sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - script.execute: disable_repeat
      - if:
          condition:
            media_player.is_announcing:
          then:
            media_player.stop:
              announcement: true
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      - script.execute: control_leds
    on_turn_on:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      - script.execute: ring_timer
      - script.execute: control_leds
      - delay: 15min
      - switch.turn_off: timer_ringing
  - platform: template
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: alarm_on
    icon: mdi:bell-badge
    name: "Alarm on"
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - script.execute: control_leds

binary_sensor:
  - platform: gpio
    id: user_button
    pin:
      number: GPIO3
      inverted: true
    name: "User button"
    on_press:
      - script.execute: control_leds
    on_release:
      - script.execute: control_leds
      - if:
          condition:
            lambda: return id(factory_reset_requested);
          then:
            - button.press: factory_reset_button
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - if:
                    condition:
                      switch.is_on: timer_ringing
                    then:
                      - switch.turn_off: timer_ringing
                    else:
                      - if:
                          condition:
                            voice_assistant.is_running:
                          then:
                            - voice_assistant.stop:
                          else:
                            - if:
                                condition:
                                  media_player.is_announcing:
                                then:
                                  media_player.stop:
                                    announcement: true
                                else:
                                  - if:
                                      condition:
                                        media_player.is_playing:
                                      then:
                                        - media_player.pause:
                                      else:
                                        - if:
                                            condition:
                                              and:
                                                - switch.is_off: mic_mute_switch
                                                - not:
                                                    voice_assistant.is_running
                                            then:
                                              - if:
                                                  condition:
                                                    switch.is_on: button_sound
                                                  then:
                                                    - lambda: |-
                                                        id(play_sound).execute(true, id(center_button_press_sound));
                                                    - delay: 300ms
                                              - voice_assistant.start:
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - if:
                    condition:
                      switch.is_on: button_sound
                    then:
                      - lambda: |-
                          id(play_sound).execute(false, id(center_button_double_press_sound));
                - event.trigger:
                    id: button_press_event
                    event_type: "double_press"
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - if:
                    condition:
                      switch.is_on: button_sound
                    then:
                      - lambda: |-
                          id(play_sound).execute(false, id(center_button_triple_press_sound));
                - event.trigger:
                    id: button_press_event
                    event_type: "triple_press"
      - timing:
          - ON for at least 1s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - if:
                    condition:
                      switch.is_on: button_sound
                    then:
                      - lambda: |-
                          id(play_sound).execute(false, id(center_button_long_press_sound));
                - light.turn_off: led_internal
                - event.trigger:
                    id: button_press_event
                    event_type: "long_press"
      - timing:
          - ON for at least 10s
        then:
          - light.turn_on:
              brightness: 100%
              id: led_internal
              effect: "Factory Reset Coming Up"
          - lambda: |-
              id(play_sound).execute(true, id(factory_reset_initiated_sound));
          - wait_until:
              binary_sensor.is_off: user_button
          - if:
              condition:
                lambda: return !id(factory_reset_requested);
              then:
                - light.turn_off: led_internal
                - lambda: |-
                    id(play_sound).execute(true, id(factory_reset_cancelled_sound));
      - timing:
          - ON for at least 22s
        then:
          - lambda: |-
              id(play_sound).execute(true, id(factory_reset_confirmed_sound));
          - light.turn_on:
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              id: led_internal
              effect: "none"
          - lambda: id(factory_reset_requested) = true;

light:
  - platform: esp32_rmt_led_strip
    id: led_internal
    internal: true
    rgb_order: GRB
    pin: GPIO1
    num_leds: 1
    rmt_symbols: 192
    chipset: ws2812
    default_transition_length: 0s
    effects:
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 200ms
          lambda: |-
            static bool on = true;
            if (on) {
              it[0] = Color(255, 0, 0);
            } else {
              it[0] = Color(0, 0, 0);
            }
            on = !on;
      - addressable_lambda:
          name: "Fast Pulse"
          update_interval: 10ms
          lambda: |-
            static float fraction = 0.0;
            static float step = 0.05;
            static bool increasing = true;
            auto values = id(led_internal)->current_values;
            Color color(values.get_red() * 255, values.get_green() * 255, values.get_blue() * 255);
            it[0].set_rgb(color.red * fraction, color.green * fraction, color.blue * fraction);
            fraction += (step * (increasing ? 1 : -1));
            if (fraction > 1.0) { fraction = 1.0; increasing = !increasing; }
            else if (fraction < 0.0) { fraction = 0.0; increasing = !increasing; }
      - addressable_lambda:
          name: "Slow Pulse"
          update_interval: 30ms
          lambda: |-
            static float fraction = 0.0;
            static float step = 0.05;
            static bool increasing = true;
            auto values = id(led_internal)->current_values;
            Color color(values.get_red() * 255, values.get_green() * 255, values.get_blue() * 255);
            it[0].set_rgb(color.red * fraction, color.green * fraction, color.blue * fraction);
            fraction += (step * (increasing ? 1 : -1));
            if (fraction > 1.0) { fraction = 1.0; increasing = !increasing; }
            else if (fraction < 0.0) { fraction = 0.0; increasing = !increasing; }
  - platform: partition
    id: led_respeaker_onboard
    name: LED Respeaker onboard
    entity_category: config
    icon: "mdi:circle-outline"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_off:
      - script.execute: control_leds
    initial_state:
      color_mode: rgb
      brightness: 100%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: led_internal
        from: 0
        to: 0
    effects:
      - addressable_lambda:
          name: "Fast Pulse"
          update_interval: 10ms
          lambda: |-
            static float fraction = 0.0;
            static float step = 0.05;
            static bool increasing = true;
            auto values = id(led_respeaker_onboard)->current_values;
            Color color(values.get_red() * 255, values.get_green() * 255, values.get_blue() * 255);
            it[0].set_rgb(color.red * fraction, color.green * fraction, color.blue * fraction);
            fraction += (step * (increasing ? 1 : -1));
            if (fraction > 1.0) { fraction = 1.0; increasing = !increasing; }
            else if (fraction < 0.0) { fraction = 0.0; increasing = !increasing; }
      - addressable_lambda:
          name: "Slow Pulse"
          update_interval: 30ms
          lambda: |-
            static float fraction = 0.0;
            static float step = 0.05;
            static bool increasing = true;
            auto values = id(led_respeaker_onboard)->current_values;
            Color color(values.get_red() * 255, values.get_green() * 255, values.get_blue() * 255);
            it[0].set_rgb(color.red * fraction, color.green * fraction, color.blue * fraction);
            fraction += (step * (increasing ? 1 : -1));
            if (fraction > 1.0) { fraction = 1.0; increasing = !increasing; }
            else if (fraction < 0.0) { fraction = 0.0; increasing = !increasing; }

sensor:
  - platform: template
    id: next_timer
    name: "Next timer"
    update_interval: never
    disabled_by_default: true
    device_class: duration
    unit_of_measurement: s
    icon: "mdi:timer"

text_sensor:
  - platform: template
    id: next_timer_name
    name: "Next timer name"
    icon: "mdi:timer"
    disabled_by_default: true
  - platform: template
    name: "Alarm time"
    id: alarm_time
    icon: mdi:bell-ring
  - platform: template
    name: "Current device time"
    id: current_time
    icon: mdi:clock

event:
  - platform: template
    id: button_press_event
    name: "Button press"
    icon: mdi:button-pointer
    device_class: button
    event_types:
      - double_press
      - triple_press
      - long_press

script:
  - id: control_leds
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          if (id(is_timer_active)){
            id(fetch_first_active_timer).execute();
          }
          if (id(improv_ble_in_progress)) {
            id(control_leds_improv_ble_state).execute();
          } else if (id(init_in_progress)) {
            id(control_leds_init_state).execute();
          } else if (!id(wifi_id).is_connected() || !id(api_id).is_connected()){
            id(control_leds_no_ha_connection_state).execute();
          } else if (id(user_button).state) {
            id(control_leds_center_button_touched).execute();
          } else if (id(timer_ringing).state) {
            id(control_leds_timer_ringing).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
            id(control_leds_voice_assistant_waiting_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
            id(control_leds_voice_assistant_listening_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            id(control_leds_voice_assistant_thinking_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            id(control_leds_voice_assistant_replying_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
            id(control_leds_voice_assistant_not_ready_phase).execute();
          } else if (id(is_timer_active)) {
            id(control_leds_timer_ticking).execute();
          } else if (id(alarm_on).state && !id(led_respeaker_onboard).remote_values.is_on()) {
            id(control_leds_alarm_active).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
            id(control_leds_voice_assistant_idle_phase).execute();
          }

  - id: control_leds_improv_ble_state
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.89f, 0.71f);
          call.set_effect("Slow Pulse");
          call.perform();

  - id: control_leds_init_state
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                auto call = id(led_internal).turn_on();
                call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
                call.set_rgb(0.09f, 0.73f, 0.95f);
                call.set_effect("Fast Pulse");
                call.perform();
          else:
            - lambda: |-
                auto call = id(led_internal).turn_on();
                call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
                call.set_rgb(0.09f, 0.73f, 0.95f);
                call.set_effect("Slow Pulse");
                call.perform();

  - id: control_leds_no_ha_connection_state
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.0f, 0.0f);
          call.set_effect("Slow Pulse");
          call.perform();

  - id: control_leds_voice_assistant_idle_phase
    then:
      - light.turn_off: led_internal
      - if:
          condition:
            light.is_on: led_respeaker_onboard
          then:
            light.turn_on: led_respeaker_onboard

  - id: control_leds_voice_assistant_waiting_for_command_phase
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.2f, 1.0f);
          call.set_effect("Slow Pulse");
          call.perform();

  - id: control_leds_voice_assistant_listening_for_command_phase
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.2f, 1.0f);
          call.set_effect("Slow Pulse");
          call.perform();

  - id: control_leds_voice_assistant_thinking_phase
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.2f, 1.0f);
          call.set_effect("Fast Pulse");
          call.perform();

  - id: control_leds_voice_assistant_replying_phase
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(0.2f, 1.0f, 1.0f);
          call.set_effect("Slow Pulse");
          call.perform();

  - id: control_leds_voice_assistant_error_phase
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.0f, 0.0f);
          call.set_effect("Fast Pulse");
          call.perform();

  - id: control_leds_voice_assistant_not_ready_phase
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.0f, 0.0f);
          call.set_effect("Slow Pulse");
          call.perform();

  - id: control_leds_center_button_touched
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(min(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f) + 0.1f, 1.0f));
          call.set_rgb(0.0f, 0.0f, 1.0f);
          call.set_effect("None");
          call.perform();

  - id: control_leds_timer_ringing
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(min(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f) + 0.1f, 1.0f));
          call.set_rgb(0.0f, 1.0f, 0.0f);
          call.set_effect("Fast Pulse");
          call.perform();

  - id: control_leds_timer_ticking
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(0.3f, 0.3f, 0.3f);
          call.set_effect("Slow Pulse");
          call.perform();

  - id: control_leds_alarm_active
    then:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(0.3f);
          call.set_rgb(0.0f, 1.0f, 0.0f);
          call.set_effect("None");
          call.perform();

  - id: ring_timer
    then:
      - script.execute: enable_repeat_one
      - lambda: |-
          id(play_sound).execute(true, id(timer_finished_sound));

  - id: enable_repeat_one
    then:
      - lambda: |-
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 500);

  - id: disable_repeat
    then:
      - lambda: |-
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
              .set_announcement(true)
              .perform();
            id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);

  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          if (priority) {
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(external_media_player)
              ->play_file(sound_file, true, false);
          }

  - id: fetch_first_active_timer
    then:
      - lambda: |-
          const auto& timers = id(va).get_timers();
          if (timers.empty()) return;
          auto output_timer = timers[0];
          for (const auto& timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(first_active_timer) = output_timer;

  - id: check_if_timers_active
    then:
      - lambda: |-
          const auto& timers = id(va).get_timers();
          bool output = false;
          for (const auto& timer : timers) {
            if (timer.is_active) {
              output = true;
              break;
            }
          }
          id(is_timer_active) = output;

  - id: activate_stop_word_once
    then:
      - lambda: |-
          // stop wake word removed (no v2 model available)
          // TTS stop functionality handled by button press only
  - id: check_alarm
    then:
      - lambda: |-
          id(publish_current_time).execute();
          if (id(alarm_on).state && id(alarm_time).has_state()) {
            auto set_alarm_time = id(alarm_time).state;
            if (set_alarm_time.length() == 5 &&
              isdigit(set_alarm_time[0]) && isdigit(set_alarm_time[1]) &&
              isdigit(set_alarm_time[3]) && isdigit(set_alarm_time[4])) {
              auto alarm_hour = std::stoi(set_alarm_time.substr(0, 2));
              auto alarm_minute = std::stoi(set_alarm_time.substr(3, 2));
              auto time_now = id(homeassistant_time).now();
              if (time_now.hour == alarm_hour && time_now.minute == alarm_minute) {
                auto action = id(alarm_action).current_option();
                if (action == "Play sound") {
                  id(timer_ringing).turn_on();
                } else if (action == "Send event") {
                  id(send_alarm_event).execute();
                } else if (action == "Sound and event") {
                  id(timer_ringing).turn_on();
                  id(send_alarm_event).execute();
                }
              }
            } else {
              ESP_LOGW("alarm", "Incorrect alarm time setting");
            }
          }

  - id: send_alarm_event
    then:
      - homeassistant.event:
          event: esphome.alarm_ringing

  - id: send_tts_uri_event
    parameters:
      tts_uri: string
    then:
      - lambda: id(tts_uri_buf) = tts_uri;
      - homeassistant.event:
          event: esphome.tts_uri
          data:
            uri: !lambda return id(tts_uri_buf);

  - id: send_stt_text_event
    parameters:
      stt_text: string
    then:
      - lambda: id(stt_text_buf) = stt_text;
      - homeassistant.event:
          event: esphome.stt_text
          data:
            text: !lambda return id(stt_text_buf);

  - id: publish_current_time
    then:
      - lambda: |-
          auto time_now = id(homeassistant_time).now();
          id(current_time).publish_state(time_now.strftime("%H:%M"));

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin:
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO8
      allow_other_uses: true
    i2s_mclk_pin:
      number: GPIO9
      allow_other_uses: true
  - id: i2s_input
    i2s_lrclk_pin:
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO8
      allow_other_uses: true
    i2s_mclk_pin:
      number: GPIO9
      allow_other_uses: true

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO44
    adc_type: external
    pdm: false
    sample_rate: 48000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_mode: secondary
    i2s_dout_pin: GPIO43
    bits_per_sample: 32bit
    i2s_audio_id: i2s_output
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms
    audio_dac: aic3204_dac
  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

media_player:
  - platform: speaker
    id: external_media_player
    name: "None"
    internal: false
    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC
      num_channels: 2
      sample_rate: 48000
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      if:
        condition:
          and:
            - switch.is_off: timer_ringing
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing:
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s
    files:
      - id: center_button_press_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_press.flac
      - id: center_button_double_press_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_double_press.flac
      - id: center_button_triple_press_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_triple_press.flac
      - id: center_button_long_press_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_long_press.flac
      - id: factory_reset_initiated_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_initiated.mp3
      - id: factory_reset_cancelled_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_cancelled.mp3
      - id: factory_reset_confirmed_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_confirmed.mp3
      - id: mute_switch_on_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
      - id: mute_switch_off_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
      - id: error_cloud_expired
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3

respeaker_lite:
  id: respeaker
  reset_pin: GPIO2
  mute_state:
    internal: true
    id: mute_state
  firmware_version:
    icon: mdi:application-cog
    name: XMOS firmware version
    internal: false
    id: firmware_version
  # ---------------------------------------------------------------------------
  # XMOS firmware auto-update
  # Comment out the entire firmware: block below if you manually DFU-flashed
  # this board using dfu-util. Leaving it active on a manually-flashed board
  # may cause a hash mismatch error on boot.
  # Leave it active on a fresh out-of-box board — it will flash v1.1.0
  # automatically. LED pulses gray during update, flashes green on success.
  # ---------------------------------------------------------------------------
  firmware:
    url: https://github.com/formatBCE/Respeaker-Lite-ESPHome-integration/raw/refs/heads/main/respeaker_lite_i2s_dfu_firmware_48k_v1.1.0.bin
    version: "1.1.0"
    md5: 9297155d1bf3eb21a9d4db52a89ea0c6
    on_begin:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(0.5f, 0.5f, 0.5f);
          call.set_effect("Slow Pulse");
          call.perform();
    on_end:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(0.0f, 1.0f, 0.0f);
          call.set_effect("Fast Pulse");
          call.perform();
      - delay: 3s
      - light.turn_off:
          id: led_internal
    on_error:
      - lambda: |-
          auto call = id(led_internal).turn_on();
          call.set_brightness(max(id(led_respeaker_onboard).current_values.get_brightness(), 0.2f));
          call.set_rgb(1.0f, 0.0f, 0.0f);
          call.set_effect("Fast Pulse");
          call.perform();
      - delay: 3s
      - light.turn_off:
          id: led_internal

external_components:
  # formatBCE's i2s_audio fork — respeaker_microphone branch.
  # Not officially updated for 2026.4.x as of May 2026.
  # Do a Clean Build first when upgrading ESPHome versions.
  # Watch: https://github.com/formatBCE/esphome/tree/respeaker_microphone
  - source:
      type: git
      url: https://github.com/formatBCE/esphome
      ref: respeaker_microphone
    components:
      - i2s_audio
    refresh: 0s
  - source:
      type: git
      url: https://github.com/formatBCE/Respeaker-Lite-ESPHome-integration
      ref: main
    components:
      - respeaker_lite
    refresh: 0s

audio_dac:
  - platform: aic3204
    id: aic3204_dac
    i2c_id: internal_i2c

micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 1
    gain_factor: 4
  stop_after_detection: false
  models:
    - model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/okay_nabu.json
      id: okay_nabu
    - model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/hey_jarvis.json
      id: hey_jarvis
      internal: true 
  vad:
    probability_cutoff: 0.05
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: mic_mute_switch
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      voice_assistant.stop:
                    else:
                      - if:
                          condition:
                            media_player.is_announcing:
                          then:
                            - media_player.stop:
                                announcement: true
                          else:
                            - if:
                                condition:
                                  switch.is_on: wake_sound
                                then:
                                  - lambda: |-
                                      id(play_sound).execute(true, id(wake_word_triggered_sound));
                                  - delay: 300ms
                            - voice_assistant.start:
                                wake_word: !lambda return wake_word;

select:
  - platform: template
    name: "Wake word sensitivity"
    optimistic: true
    initial_option: Slightly sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      # Probability cutoffs as quantized uint8 values.
      # Comments show floating point equivalent and FAPH (False Accepts Per Hour)
      # tested against the Dinner Party Corpus.
      # Applies to: okay_nabu@20241226.3, hey_jarvis@v1
      lambda: |-
        if (x == "Slightly sensitive") {
          id(okay_nabu).set_probability_cutoff(217);    // 0.85 -> 0.000 FAPH
          id(hey_jarvis).set_probability_cutoff(247);   // 0.97 -> 0.563 FAPH
        } else if (x == "Moderately sensitive") {
          id(okay_nabu).set_probability_cutoff(176);    // 0.69 -> 0.376 FAPH
          id(hey_jarvis).set_probability_cutoff(235);   // 0.92 -> 0.939 FAPH
        } else if (x == "Very sensitive") {
          id(okay_nabu).set_probability_cutoff(143);    // 0.56 -> 0.751 FAPH
          id(hey_jarvis).set_probability_cutoff(212);   // 0.83 -> 1.502 FAPH
        }
  - platform: logger
    id: logger_select
    name: Logger Level
    disabled_by_default: true
  - platform: template
    optimistic: true
    name: "Alarm action"
    id: alarm_action
    icon: mdi:bell-plus
    options:
      - "Play sound"
      - "Send event"
      - "Sound and event"
    initial_option: "Play sound"
    on_value:
      then:
        - lambda: |-
            id(saved_alarm_action) = x;

voice_assistant:
  id: va
  microphone:
    microphone: i2s_mics
    channels: 0
  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  # These three values are now controlled by HA sliders (see number: section above).
  # The slider initial_value here must match initial_value in the number: entities.
  # If you change them here, update the sliders too.
  noise_suppression_level: 3
  auto_gain: 31 dbfs
  volume_multiplier: 2
  on_client_connected:
    - if:
        condition:
          - lambda: return id(init_in_progress);
          - switch.is_on: mic_mute_switch
        then:
          - switch.turn_off: mic_mute_switch
    - lambda: id(init_in_progress) = false;
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds
  on_error:
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    - if:
        condition:
          - lambda: return code == "cloud-auth-failed";
        then:
          - lambda: |-
              id(play_sound).execute(true, id(error_cloud_expired));
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0.0s
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
  on_intent_progress:
    - if:
        condition:
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          - script.execute: activate_stop_word_once
  on_tts_start:
    - if:
        condition:
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          - script.execute: activate_stop_word_once
  on_tts_end:
    - lambda: |-
        id(send_tts_uri_event).execute(x);
  on_stt_end:
    - lambda: |-
        id(send_stt_text_event).execute(x);
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - lambda: |
        id(next_timer).publish_state(-1);
        id(next_timer_name).publish_state("-");
  on_timer_started:
    - script.execute: control_leds
    - lambda: |
        id(next_timer).publish_state(id(first_active_timer).seconds_left);
        id(next_timer_name).publish_state(id(first_active_timer).name);
  on_timer_cancelled:
    - script.execute: control_leds
    - lambda: |
        id(next_timer).publish_state(id(first_active_timer).seconds_left);
        id(next_timer_name).publish_state(id(first_active_timer).name);
  on_timer_updated:
    - script.execute: control_leds
    - lambda: |
        id(next_timer).publish_state(id(first_active_timer).seconds_left);
        id(next_timer_name).publish_state(id(first_active_timer).name);
  on_timer_tick:
    - script.execute: control_leds
    - lambda: |
        int seconds_left = id(first_active_timer).seconds_left;
        if (std::abs(seconds_left) % 5 == 0) {
          id(next_timer).publish_state(seconds_left);
        }

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    entity_category: diagnostic
    internal: true
  - platform: restart
    id: restart_button
    name: "Restart"
    entity_category: config
    disabled_by_default: true
    icon: "mdi:restart"

debug:
  update_interval: 5s
